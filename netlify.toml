# Wipe node_modules before install so a bad Netlify dependency cache cannot leave half‑extracted
# packages (e.g. semver missing index.js). Netlify may still cache other dirs; this is the reliable fix.
[build]
  command = "rm -rf node_modules && npm ci && npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "18.20.4"
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_OPTIONS = "--openssl-legacy-provider"
